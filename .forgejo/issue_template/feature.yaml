name: Feature Request
about: Suggest something scampi should do that it currently doesn't
title: ""
labels:
  - Kind/Feature
body:
  - type: markdown
    attributes:
      value: |
        Hi, and thanks for sketching a feature idea!

        scampi is opinionated about scope, so a short discussion before
        you write code is usually the cheapest alignment. The fields
        below help me understand the *why* before the *what*.

  - type: textarea
    id: use_case
    attributes:
      label: What are you trying to do?
      description: |
        The real-world scenario. "I'm deploying X and want Y because Z"
        beats "scampi should support X" — the use case lets us find a
        good fit even if the proposed solution doesn't land.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed shape
      description: |
        What would the API / syntax / step config look like? Sketch is
        fine — exact names aren't important yet.
      render: text
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you thought about and why they didn't fit.
        "None — this seems like the obvious shape" is a valid answer.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: |
        Related issues, examples from other tools, links, screenshots.
    validations:
      required: false
