name: Bug Report
about: Something is broken or behaves wrong
title: ""
labels:
  - Kind/Bug
body:
  - type: markdown
    attributes:
      value: |
        Hi, and thanks for filing a bug report!

        A few fields below help me reproduce and triage faster. Skip any
        you genuinely don't know — "not sure" is a fine answer.

  - type: input
    id: version
    attributes:
      label: scampi version
      description: Output of `scampi --version`
      placeholder: e.g. v0.1.0-alpha.7
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A short description of the bug.
      placeholder: scampi crashed when ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Minimal config or commands. A small inline `.scampi` snippet is
        ideal — include the target declaration (`local.target {...}`,
        `ssh.target {...}`, etc.) so the snippet runs as-is. If you
        can't share, describe the shape.
      placeholder: |
        1. Create config with ...
        2. Run `scampi apply foo.scampi`
        3. ...
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: |
        Include the error message verbatim if there was one. Stack
        traces or full output are welcome.
      render: text
    validations:
      required: true

  - type: textarea
    id: host
    attributes:
      label: Host environment
      description: |
        Output of `uname -a` (with the hostname removed if you'd rather
        not share it). Gives kernel + arch + Darwin/Linux version in
        one line — useful for reproducing platform-specific bugs.
      placeholder: Darwin 25.4.0 Darwin Kernel Version 25.4.0 ... arm64
      render: text
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: |
        Workarounds you've tried, related issues, hunches, screenshots —
        whatever might be useful.
    validations:
      required: false
