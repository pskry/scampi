[defaults]
inventory            = inventory.ini
host_key_checking    = False
forks                = 10
gathering            = explicit
stdout_callback      = default
deprecation_warnings = False

[ssh_connection]
# OpenSSH ControlMaster — matches what scampi does at the protocol
# level (one TCP connection per host, multiplexed channels). Without
# this ansible re-dials per task, which would be a per-tool handicap
# instead of a fair architectural comparison.
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-ssh-%h-%p-%r
pipelining = true
