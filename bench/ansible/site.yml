---
# Bench workload (ansible side) — install nginx, render 5 templates,
# ensure service running across the 3 LXCs created by provision/.
#
# Idiomatic playbook matching the scampi config in
# ../scampi/deploy.scampi. The nginx version pin must match the
# scampi side so the comparison is fair.
#
# Run from a venv with pinned ansible-core (see ../README.md):
#
#   ansible-playbook -i inventory.ini site.yml
#
# Idempotent: a second run reports zero changes.

- name: bench — nginx deploy
  hosts: bench
  become: true
  gather_facts: false
  vars:
    # Single source of truth for the pin: NGINX_VERSION in
    # bench/.env.example. Same env var feeds ../scampi/deploy.scampi
    # so both tools install the exact same package on every run.
    nginx_version: "{{ lookup('env', 'NGINX_VERSION') }}"
    workers:     2
    listen_port: 80
    doc_root:    /var/www/html
    site_a_host: site-a.bench.local
    site_b_host: site-b.bench.local
    title:       "ansible bench"
  tasks:
    - name: install nginx (version-pinned)
      ansible.builtin.apt:
        name: "{{ nginx_version }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: render main nginx.conf
      ansible.builtin.template:
        src:    nginx.conf.j2
        dest:   /etc/nginx/nginx.conf
        owner:  root
        group:  root
        mode:   "0644"
      notify: reload nginx

    - name: render default vhost
      ansible.builtin.template:
        src:    default.conf.j2
        dest:   /etc/nginx/conf.d/default.conf
        owner:  root
        group:  root
        mode:   "0644"
      notify: reload nginx

    - name: render site A vhost
      ansible.builtin.template:
        src:    site_a.conf.j2
        dest:   /etc/nginx/conf.d/site_a.conf
        owner:  root
        group:  root
        mode:   "0644"
      notify: reload nginx

    - name: render site B vhost
      ansible.builtin.template:
        src:    site_b.conf.j2
        dest:   /etc/nginx/conf.d/site_b.conf
        owner:  root
        group:  root
        mode:   "0644"
      notify: reload nginx

    - name: render landing page
      ansible.builtin.template:
        src:    index.html.j2
        dest:   /var/www/html/index.html
        owner:  root
        group:  root
        mode:   "0644"
      notify: reload nginx

    - name: ensure nginx running and enabled
      ansible.builtin.service:
        name:    nginx
        state:   started
        enabled: true

  handlers:
    - name: reload nginx
      ansible.builtin.service:
        name:  nginx
        state: reloaded
